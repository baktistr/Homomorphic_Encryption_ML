<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" font-family="Inter, Segoe UI, system-ui, sans-serif">
  <!-- Client: Encrypt -->
  <rect x="20" y="30" width="200" height="140" rx="12" fill="#EBF2FB" stroke="#4A90D9" stroke-width="2"/>
  <text x="120" y="65" text-anchor="middle" font-size="28">&#x1F513;</text>
  <text x="120" y="95" text-anchor="middle" font-weight="600" font-size="15" fill="#1B2A4A">Client</text>
  <text x="120" y="118" text-anchor="middle" font-size="12" fill="#4A90D9">Encrypt features</text>
  <text x="120" y="136" text-anchor="middle" font-size="11" fill="#7F8C8D">Secret key stays here</text>

  <!-- Arrow 1 -->
  <line x1="230" y1="100" x2="290" y2="100" stroke="#7F8C8D" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="260" y="88" text-anchor="middle" font-size="10" fill="#7F8C8D">ciphertext</text>

  <!-- Server: Compute -->
  <rect x="300" y="30" width="200" height="140" rx="12" fill="#E8F8EF" stroke="#2ECC71" stroke-width="2"/>
  <text x="400" y="65" text-anchor="middle" font-size="28">&#x1F512;</text>
  <text x="400" y="95" text-anchor="middle" font-weight="600" font-size="15" fill="#1B2A4A">Server</text>
  <text x="400" y="118" text-anchor="middle" font-size="12" fill="#1a9c54">Compute on encrypted data</text>
  <text x="400" y="136" text-anchor="middle" font-size="11" fill="#7F8C8D">No plaintext access</text>

  <!-- Arrow 2 -->
  <line x1="510" y1="100" x2="570" y2="100" stroke="#7F8C8D" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="540" y="88" text-anchor="middle" font-size="10" fill="#7F8C8D">encrypted score</text>

  <!-- Client: Decrypt -->
  <rect x="580" y="30" width="200" height="140" rx="12" fill="#EBF2FB" stroke="#4A90D9" stroke-width="2"/>
  <text x="680" y="65" text-anchor="middle" font-size="28">&#x1F513;</text>
  <text x="680" y="95" text-anchor="middle" font-weight="600" font-size="15" fill="#1B2A4A">Client</text>
  <text x="680" y="118" text-anchor="middle" font-size="12" fill="#4A90D9">Decrypt &amp; decide</text>
  <text x="680" y="136" text-anchor="middle" font-size="11" fill="#7F8C8D">Fraud label computed locally</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7F8C8D"/>
    </marker>
  </defs>
</svg>
